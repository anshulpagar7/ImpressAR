<!DOCTYPE html>
<html>

<head>

<title>ImpressAR Interview</title>

<link rel="stylesheet" href="/static/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<h1>ImpressAR Interview Trainer</h1>
</header>

<div class="dashboard">

<!-- LEFT SIDE CAMERA -->

<div class="camera-section">

<video id="video" autoplay playsinline></video>

<div class="status-box">

<p id="postureStatus">Posture: --</p>
<p id="eyeStatus">Eye Contact: --</p>
<p id="fidgetStatus">Fidget: --</p>

</div>

</div>


<!-- RIGHT SIDE PANEL -->

<div class="panel">

<div class="card">

<h2 id="question">Press Start Interview</h2>

<p id="progressTracker"></p>

</div>

<div class="card">

<h3>Timer</h3>

<h1 id="timer">180</h1>

</div>

<div class="card">

<h3>Confidence Score</h3>

<div class="score-circle">

<span id="scoreCircle">70</span>

</div>

</div>

<div class="controls">

<button onclick="startInterview()">Start</button>

<button onclick="nextQuestion()">Next</button>

<button onclick="finishInterview()">Finish</button>

</div>

</div>

</div>


<div class="report-section">

<h2>Confidence Trend</h2>

<canvas id="chart"></canvas>

<div id="report"></div>

</div>

<canvas id="hidden" style="display:none"></canvas>

<script src="/static/script.js"></script>

</body>

</html>

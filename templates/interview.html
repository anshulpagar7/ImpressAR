<!DOCTYPE html>
<html>

<head>

<title>ImpressAR Interview</title>

<link rel="stylesheet" href="/static/style.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
body{
    margin:0;
    font-family:'Inter', sans-serif;
}

/* HEADER */
header{
    padding:20px 40px;
}

/* MAIN LAYOUT */
.interview-container{
    display:grid;
    grid-template-columns: 2fr 1fr;
    gap:25px;
    padding:20px 40px;
}

/* CAMERA */
.camera-box{
    position:relative;
    border-radius:12px;
    overflow:hidden;
}

video{
    width:100%;
    height:100%;
    border-radius:12px;
}

.overlay{
    position:absolute;
    bottom:10px;
    left:10px;
    background:rgba(0,0,0,0.6);
    padding:8px 12px;
    border-radius:8px;
    font-size:14px;
}

/* AI PANEL */
.ai-panel{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* CARDS */
.card{
    padding:20px;
    border-radius:12px;
}

/* QUESTION */
#question{
    font-size:18px;
    margin-bottom:10px;
}

/* TIMER */
#timer{
    font-size:36px;
    text-align:center;
}

/* SCORE */
.score-circle{
    width:100px;
    height:100px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    font-size:22px;
}

/* STATUS */
.status-card p{
    margin:6px 0;
}

/* CONTROLS */
.controls{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.controls button{
    flex:1;
    padding:12px;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>

<body>

<header>

<div class="logo">
<i data-lucide="brain"></i>
ImpressAR
</div>

</header>


<div class="interview-container">

<!-- CAMERA SIDE -->
<div class="camera-box">

<video id="video" autoplay playsinline></video>

<div class="overlay">
<p id="feedback">AI Monitoring...</p>
</div>

</div>


<!-- AI PANEL -->
<div class="ai-panel">

<div class="card">
<h2 id="question">Press Start Interview</h2>
<p id="progressTracker"></p>
</div>

<div class="card">
<h3>Timer</h3>
<h1 id="timer">180</h1>
</div>

<div class="card">
<h3>Confidence</h3>
<div class="score-circle">
<span id="scoreCircle">70</span>
</div>
</div>

<div class="card status-card">
<p id="postureStatus">Posture: --</p>
<p id="eyeStatus">Eye Contact: --</p>
<p id="fidgetStatus">Fidget: --</p>
</div>

<div class="controls">

<button onclick="startInterview()">
<i data-lucide="play"></i> Start
</button>

<button onclick="nextQuestion()">
<i data-lucide="arrow-right"></i> Next
</button>

<button onclick="finishInterview()">
<i data-lucide="check"></i> Finish
</button>

</div>

</div>

</div>


<canvas id="hidden" style="display:none"></canvas>

<script src="/static/script.js"></script>

<script>
lucide.createIcons()
</script>

</body>

</html>
